name: Run Audit

on:
  workflow_dispatch:
    inputs:
      client:
        description: "Client slug (e.g. wheelhouseit)"
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit
        run: python audit.py --client ${{ inputs.client }}
