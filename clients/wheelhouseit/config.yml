# ============================================================================
# URL patterns to ignore (regex). The classifier skips these.
# ============================================================================

url_patterns_to_ignore:
  # System / infrastructure
  - ^/cdn-cgi/
  - ^/author/
  - ^/wp-admin/
  - ^/feed/?$
  - ^/sitemap

  # Blog tags and categories (kept separate from actual blog posts)
  - ^/blog/tag/
  - ^/blog/category/

  # Events, donations, internal celebrations
  - ^/2023-hipaa-wine-tasting$
  - ^/2024-eoy-90s-party$
  - ^/happynewyear-teamalpha$
  - ^/charity-donation$
  - ^/sunserve-donation$
  - ^/undercoversanta-donation$
  - ^/elegance-and-ethics$
  - ^/inc-500$
  - ^/wheelhouse-it-vitalopps$

  # Lead magnets / checklists / one-off resources
  - ^/msp-buyers-guide-checklist$
  - ^/cybersecurity-checklist$
  - ^/hipaa-compliance-for-healthcare-checklist$
  - ^/hurricane-
  - ^/storm$
  - ^/top-7-tips-for-preparing-
  - ^/how-to-prepare-your-electronics-against-disaster$
  - ^/how-to-protect-your-organization-against-power-surges$
  - ^/how-to-perform-regular-checks-on-your-disaster-recovery-plan$
  - ^/the-comprehensive-guide-to-disaster-recovery$
  - ^/3-elements-multi-tiered-disaster-recovery-plan$
  - ^/6-steps-to-avoid-hipaa-fines$
  - ^/business-associate-agreement$
  - ^/services-guide$

  # Thank-you and form-flow pages
  - ^/thank-you
  - ^/save-money-discover-your-it$
  - ^/discover-your-it$

  # Article-style content sitting at root (should probably be moved to /blog/)
  # REVIEW: these may need to be flagged as misplaced rather than ignored
  - ^/how-to-apply-inbound-marketing-to-your-business$
  - ^/how-to-manage-a-team-remotely$
  - ^/microsoft-modern-office-everything-you-need-to-know$
  - ^/microsoft-teams-makes-managing-telecommuting-employees-easy$
  - ^/enhance-your-teams-online-collaboration-using-microsoft-sharepoint$
  - ^/collaborate-on-visio-files-inside-microsoft-teams$
  - ^/does-your-business-need-to-upgrade-to-business-grade-wifi$
  - ^/what-can-you-integrate-with-your-crm-solution$
  - ^/understanding-how-managed-service-providers-reduce-it-security-issues$
  - ^/it-buzzwords-to-know-in-2021$
  - ^/lets-buy-a-computer-part-
  - ^/streamline-it$
  - ^/unrivaled-it-partnership$
  - ^/the-nine$
  - ^/terminating-underperforming-msp$
  - ^/support-for-windows-10-end-of-life$
  - ^/identifying-the-value-of-managed-it-     # 5 separate pages on this topic
  - ^/dark-web$
  - ^/it-security-tools$
  - ^/security-audit-definitions$
  - ^/remote-desktop-tools$
  - ^/on-premise-server-tracker$

  # "About" and supplementary pages without SOP equivalents (handled separately)
  - ^/standards$
  - ^/mission-statement-core-values$
  - ^/leadership-team$
  - ^/management-team$
  - ^/the-nine$
  - ^/news$
  - ^/press$
  - ^/resources$
  - ^/webinars$
  - ^/faq$
  - ^/assessment$
  - ^/careers$
  - ^/client-case-study$
  - ^/accessibility-statement$
  - ^/industries$
  - ^/training$
  - ^/training/

  # Customer login / portal
  - ^/support$            # Customer login portal, not an IT Support service page

  # Form pages — NOTE: WHIT uses /company and /contact instead of /about-us/ and /contact-us/.
  # Per project decision, leave these ignored. Universal nav auditor will fire "missing
  # About Us / Contact Us link" on most pages as a result — that noise is accepted v1.
  - ^/contact$
  - ^/company$
