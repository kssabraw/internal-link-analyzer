# WheelHouse IT — Internal Linking Audit Config
# Drop this in clients/wheelhouseit/config.yml
#
# Decisions baked in:
# - Option B: vertical-specific services are distinct service entries
# - Canonical slug picked per service; competing variants listed as aliases
# - URL patterns that aren't commercial pages (lead magnets, events, donations,
#   awards, hurricane content, support pages) are routed to url_patterns_to_ignore
#
# Items marked "REVIEW:" in comments are decisions the human should confirm.
# Items marked "CANONICAL-CONFLICT-WATCH:" are aliases that probably represent
# duplicate pages on the live site — the canonical_conflicts auditor will flag them.

client: wheelhouseit
domain: wheelhouseit.com

