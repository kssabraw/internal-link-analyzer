# Zero Down Supply Chain Solutions — Internal Linking Audit Config
#
# ZDSCS is a national B2B supply-chain solutions provider. They are NOT a
# local-SEO business: no locations, no neighborhoods, no local landing pages.
# Only the service-side of the SOP applies here.
#
# URL convention: nested under /services/[slug]/ (SOP-permitted alternate).
# About Us lives at /company/about-us/; Contact at /contact/. Configured as
# path_aliases below.
#
# Items prefixed CANONICAL-CONFLICT-WATCH are legacy root-level URLs that
# duplicate a canonical /services/[slug]/ page — listed as service aliases so
# the canonical_conflicts auditor flags them.

client: zdscs
domain: zdscs.com

# ============================================================================
# SERVICES (10 parent services per ZDSCS product catalog)
# ============================================================================

services:
  - slug: parcel-audit
    display: Parcel Audit
    aliases:
      - parcel-audit-service          # CANONICAL-CONFLICT-WATCH: /parcel-audit-service/
      - parcel-audit-services         # CANONICAL-CONFLICT-WATCH: /parcel-audit-services/

  - slug: freight-audit-and-payment
    display: Freight Audit & Payment
    aliases: []

  - slug: carrier-contract-negotiation
    display: Carrier Contract Optimization / Negotiation
    aliases:
      - parcel-contract-negotiation   # CANONICAL-CONFLICT-WATCH: /parcel-contract-negotiation/
      - ups-contract-negotiation      # CANONICAL-CONFLICT-WATCH: /ups-contract-negotiation/

  - slug: supply-chain-business-intelligence
    display: Supply Chain Business Intelligence
    aliases:
      - supply-chain-analytics        # CANONICAL-CONFLICT-WATCH: /supply-chain-analytics/

  - slug: freight-claims-management
    display: Freight Claims Management
    aliases:
      - filing-carrier-claims         # CANONICAL-CONFLICT-WATCH: /filing-carrier-claims/

  - slug: duty-drawback
    display: Duty Drawback
    aliases: []

  - slug: transportation-management-system
    display: Transportation Management System
    aliases:
      - tms                           # generic abbreviation
      # NOTE: /transportation-management-system/ at root also exists (200).
      # The classifier will match it as a flat top-level service via the canonical
      # slug, which then conflicts with /services/transportation-management-system/.

  - slug: packaging-optimization
    display: Packaging Optimization
    aliases: []

  - slug: shipping-insurance
    display: Shipping Insurance
    aliases: []

  - slug: parcel-spend-management
    display: Parcel Spend Management
    aliases: []

# ============================================================================
# Path aliases for fixed-name pages that don't live at the SOP default path
# ============================================================================

path_aliases:
  about_us:
    - /company/about-us
  contact_us:
    - /contact

# ============================================================================
# URL patterns to ignore (regex matched against the normalized path).
# These pages are noise relative to the SOP page taxonomy.
# ============================================================================

url_patterns_to_ignore:
  # ---- System / infrastructure ----
  - ^/cdn-cgi/
  - ^/wp-admin/
  - ^/feed/?$
  - ^/sitemap
  - ^/404$
  - ^/robots\.txt$

  # ---- Blog noise: pagination, tag filters, category filters ----
  - ^/blog/page/
  - ^/blog/category/
  - ^/blog/tag/
  - ^/tag/
  - ^/category/
  - ^/page/

  # ---- Events / case studies / company sub-pages (not in SOP taxonomy) ----
  - ^/events?/?$
  - ^/events/
  - ^/event/
  - ^/case-study/?$
  - ^/case-study/
  - ^/case_studies/
  - ^/company/?$
  - ^/company/resellers/?$
  - ^/company/white-label/?$

  # ---- Lead-flow / one-off pages ----
  - ^/newsletter/?$
  - ^/get-started/?$
  - ^/demo/?$
  - ^/livedemo/?$
  - ^/our-process/?$
  - ^/resource/?$
  - ^/technology/?$
  - ^/technology-preview/?$
  - ^/managed-services/?$

  # ---- Legacy services-hub redirect candidates (not live, but appear in links) ----
